<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - THOK</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/shop.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body>

    <shared-header></shared-header>

    <main class="shop-container">
        
        <div class="shop-toolbar">
            <div class="filter-group">
                <button class="filter-btn active">Всички</button>
                <!-- <button class="filter-btn">Клавиатури</button>
                <button class="filter-btn">Суичове</button>
                <button class="filter-btn">Капачки</button> -->
            </div>
            
            <div class="sort-group">
                <label for="sort-select">Сортирай по:</label>
                <select id="sort-select" class="sort-dropdown">
                    <option value="featured">Препоръчани</option>
                    <option value="price-low">Цена: Възходяща</option>
                    <option value="price-high">Цена: Низходяща</option>
                    <option value="newest">Най-нови</option>
                </select>
            </div>
        </div>

        <div class="product-grid">
            
            <a href="key-product1.html"><div class="product-card">
                <div class="product-image-wrapper">
                    <!-- <div class="product-badge">Ръчна изработка</div> -->
                    <img src="images/key-product1/img1.jpg" alt="THOK Custom Keyboard" class="product-image">
                </div>
                <div class="product-info">
                    <h3 class="product-name">MTNU Jukebox Keycaps</h3>
                    <!-- <p class="product-switches">Lubed Gateron Milky Yellows</p> -->
                    <div class="product-price-row">
                        <span class="price">50.00€</span>
                        <button class="add-to-cart-btn" aria-label="Add to cart">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div></a>

            <a href="key-product2.html"><div class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/key-product2/img1.avif" alt="Mechanical Switches" class="product-image">
                </div>
                <div class="product-info">
                    <h3 class="product-name">Galaxy PBT Keycaps</h3>
                    <!-- <p class="product-switches">Krytox 205g0 </p> -->
                    <div class="product-price-row">
                        <span class="price">65.00€</span>
                        <button class="add-to-cart-btn" aria-label="Add to cart">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div></a>

            <a href="key-product3.html"><div class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/key-product3/img1.avif" alt="PBT Keycaps Pack" class="product-image">
                </div>
                <div class="product-info">
                    <h3 class="product-name">Strawberry Bunny PBT Keycaps</h3>
                    <!-- <p class="product-switches">Custom</p> -->
                    <div class="product-price-row">
                        <span class="price">45.00€</span>
                        <button class="add-to-cart-btn" aria-label="Add to cart">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div></a>

            <a href="key-product4.html"><div class="product-card">
                <div class="product-image-wrapper">
                    <!-- <div class="product-badge">По поръчка</div> -->
                    <img src="images/key-product4/img1.webp" alt="Custom mechanical keyboard macro pad" class="product-image">
                </div>
                <div class="product-info">
                    <h3 class="product-name">CYL Sloth R2 Keycaps</h3>
                    <p class="product-switches"></p>
                    <div class="product-price-row">
                        <span class="price">45.00€</span>
                        <button class="add-to-cart-btn" aria-label="Add to cart">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div></a>

        </div>
    </main>
    <shared-footer></shared-footer>
    <script type="module" src="/js/header.js"></script>
<script type="module" src="/js/footer.js"></script>
</body>
</html>
