<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - THOK</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/about-me.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="../js/footer.js" defer></script>

<body>
    <folder-shared-header></folder-shared-header>

    <main class="contact-container">
        <!-- <h1>Get in Touch</h1>

        <h1>Контакти</h1>
        <p class="subtitle">Ако проблем с клавиатура или поръчка? Свържете се с нас.</p>       
        <div class="contact-card">
            <div class="contact-item">
                <div class="icon-box"><i class="fa-regular fa-envelope"></i></div>
                <div class="details">
                    <h3>Email Us</h3>
                    <a href="#">------</a>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon-box"><i class="fa-solid fa-phone"></i></div>
                <div class="details">
                    <h3>Call Us</h3>
                    <a href="#">------</a>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon-box"><i class="fa-solid fa-location-dot"></i></div>
                <div class="details">
                    <h3>Visit Us</h3>
                    <p>----------</p>
                </div>

    <folder-shared-footer></folder-shared-footer>
